.container{
           max-width: 1000px;
           margin: 40px auto;
           background-color: #ffffff; 
           padding: 50px;
           border: 1px solid black;
           box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
          }

h2.gallery-title{
                 color: #1A2421;
                 text-align: center;
                 text-transform: uppercase;
                 text-decoration: underline;
                 letter-spacing: 1px;
                 margin-bottom: 40px;
                }

.gallery-grid{
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
              gap: 20px;
              padding: 10px;
             }  

.gallery-item{
              overflow: hidden;
              border: 5px solid #FBF3D1;
              transition: transform 0.3s ease, border-color 0.3s ease;
              height: 250px;
             }

.gallery-item img{
                 width: 100%;
                 height: 100%;
                 object-fit: cover;
                 display: block;
                 }

.gallery-item:hover{
                    transform: scale(1.03);
                    border-color: #D97D55;
                   }

footer{
       text-align: center;
       padding: 30px;
       font-size: 14px;
       color: #1A2421;
      }
.header-btn{
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: transparent;
            color: white;
            border: 1px solid white;
            padding: 10px 20px;
            font-family: "Times New Roman", serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor:pointer;
           }

.header-btn:hover{
                  background-color: #D97D55;
                  border-color: #D97D55;
                  }   
</style>
