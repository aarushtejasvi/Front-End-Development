<h1><center><b>LOG IN</b></center></h1>

<div class="box">
        
<label for="vol_id"><h1>Enter your email id:</h1></label>
<input type="text" id="vol_id">

<label for="vol_pass"><h1>Enter your password:</h1></label>
<input type="password" id="vol_pass">

<br>

<button class="signin" onclick="display()">Sign In</button>
    
</div>

<script>
function display() {
                    var email = document.getElementById("vol_id").value;
                    var pass = document.getElementById("vol_pass").value;
                    if (email == "" || pass == "") 
                       alert("One or more inputs missing");
                    
		    else if(email != "volunteer1@earthfoundation.org")
                       alert("User not found");
		    
		    else if(pass != "volunteer")
		       alert("Incorrect password");

		    else 
                       document.body.innerHTML = "<center><h1 style='margin-top:100px;'>Login Successful</h1><h3>Welcome back to The Earth Foundation</h3>
                                                  </center>";
                   }
    
</script>
