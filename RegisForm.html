<html>
<head>
<title>Registration - The Earth Foundation</title>
<style>

header{
       background-color: #1A2421; 
       padding: 45px 20px;
       text-align: center;
       color: #ffffff;
       margin-bottom: 0;
      }

header h1{
          font-family: "Times New Roman", Times, serif; 
          font-size: 40px;
          font-weight: normal; 
          text-decoration: underline;
          letter-spacing: 5px; 
          text-transform: uppercase;
          margin: 0;
          line-height: 1.2;
         }

header p{
         font-family: "Times New Roman", Times, serif;
         font-style: italic;
         font-size: 18px;
         margin-top: 20px;
         letter-spacing: 1px;
        }

body{
     background-color: #FBF3D1; 
     font-family: "Times New Roman", Times, serif;
     color: #2c3e50;
     margin: 0;
     padding: 0;
    }

.container{
           max-width: 650px;
           margin: 40px auto;
           background-color: #ffffff; 
           padding: 40px;
           border: 1px solid black;
           border-radius: 8px;
           box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
          }

h2.form-title{
              color: #1A2421;
              text-align: center;
              text-decoration: underline;
              margin-bottom: 30px;
              text-transform: uppercase;
              }

.form-group{
            margin-bottom: 20px;
            }

label{
      display: block;
      font-weight: bold;
      color: #1A2421;
      margin-bottom: 5px;
     }

input[type="text"], input[type="email"], input[type="tel"] {
            						    width: 100%;
            						    padding: 10px;
           						    border: 1px solid #ccc;
            						    border-radius: 4px;
           						    box-sizing: border-box; 
            						    font-family: serif;
       							   }

.gender-section{
                margin: 25px 0;
            	padding: 15px;
            	background-color: #fcfaf2;
            	border: 1px dashed #D97D55;
               }

.declaration-section{
                     font-size: 14px;
                     line-height: 1.5;
                     margin-top: 30px;
                    }

.declaration-item{
                  display: flex;
                  align-items: flex-start;
                  margin-bottom: 15px;
                  }

.declaration-item input{
                        margin-right: 15px;
                        margin-top: 5px;
                       }

.btn-submit{
            display: block;
            width: 200px;
            margin: 30px auto 0;
            padding: 12px;
            background-color: #1A2421;
            color: white;
            border: none;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
           }

.btn-submit:hover{
            	  background-color: #D97D55;
        	 }

footer{
       text-align: center;
       padding: 20px;
       font-size: 14px;
       color: #1A2421;
      }

.header-btn{
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: transparent;
            color: white;
            border: 1px solid white;
            padding: 10px 20px;
            font-family: "Times New Roman", serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
           }

.header-btn:hover{
                  background-color: #D97D55;
                  border-color: #D97D55;
                  }   

</style>
</head>

<body>

<header>
<button class="header-btn" onclick="location.href='index.html'">Home</button>
<h1>THE EARTH FOUNDATION INDIA<sup>&reg;</sup></h1>
<p>*an initiative of The Earth Company*</p>
</header>

<div class="container">

<h2 class="form-title">Volunteer Application Form</h2>

<form action="#" method="post">
            
<div class="form-group">
<label for="name">Enter your name:</label>
<input type="text" id="name" name="name" required>
</div>

<div class="form-group">
<label for="phone">Enter your contact number:</label>
<input type="tel" id="phone" name="phone" required>
</div>

<div class="form-group">
<label for="aadhar">Enter your Aadhar number:</label>
<input type="tel" id="aadhar" name="aadhar" required>
</div>

<div class="form-group">
<label for="address">Enter your permanent address:</label>
<input type="text" id="address" name="address" required>
</div>

<div class="form-group">
<label for="email">Enter your Email address:</label>
<input type="email" id="email" name="email" required>
</div>

<div class="gender-section">
<label>Select your gender:</label>
<input type="radio" id="male" name="gender" value="Male"> <label for="male" style="display:inline; font-weight:normal;"> Male</label>&nbsp;&nbsp;
<input type="radio" id="female" name="gender" value="Female"> <label for="female" style="display:inline; font-weight:normal;"> Female</label>&nbsp;&nbsp;
<input type="radio" id="other" name="gender" value="Prefer not to say"> <label for="other" style="display:inline; font-weight:normal;"> Prefer not to say</label>
</div>

<div class="declaration-section">
<div class="declaration-item">
<input type="checkbox" id="declare" name="declare" required>
<label for="declare" style="font-weight: normal; font-style: italic;">
I join The Earth Foundation not merely as a volunteer, but as a dedicated partner in the fight for environmental health. I promise to champion sustainability and climate resilience with passion.</label>
</div>

<div class="declaration-item">
<input type="checkbox" id="declare1" name="declare1" required>
<label for="declare1" style="font-weight: normal; font-size: 13px;">
I certify that all information provided is true and accurate. I agree to abide by the Terms and Conditions of The Earth Foundation.</label>
</div>
</div>
<hr>

<button type="submit" class="btn-submit">Submit </button>

</form>
</div>

<footer>
<p>Copyright © 2022 – 2028 The Earth Foundation India LTD. All rights reserved.</p>
</footer>




</body>
</html>
